services:
  - type: web
    name: jarvis-first
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: mkdir -p /data && cp -n data/master.xlsx /data/master.xlsx || true; gunicorn -w 4 -k uvicorn.workers.UvicornWorker app.main:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.3
      - key: EXCEL_PATH
        value: /data/master.xlsx
      - key: DATA_BACKEND
        value: excel
    disk:
      name: jarvis-data
      mountPath: /data
      sizeGB: 1
